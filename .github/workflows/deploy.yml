name: Deploy to Xserver

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.XSERVER_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key

          ssh -o StrictHostKeyChecking=no \
            -i ~/.ssh/key \
            -p ${{ secrets.XSERVER_PORT }} \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }} \
            "cd ~/kigeki-inc.com/public_html/alltrack && git pull origin main"



name: Deploy to Xserver

on:
  push:
    branches:
      - main
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.XSERVER_SSH_KEY }}" > ~/.ssh/key
          chmod 600 ~/.ssh/key

          ssh -o StrictHostKeyChecking=no \
            -i ~/.ssh/key \
            -p ${{ secrets.XSERVER_PORT }} \
            ${{ secrets.XSERVER_USER }}@${{ secrets.XSERVER_HOST }} \
            "if [ '${{ github.ref_name }}' = 'main' ]; then cd ~/kigeki-inc.com/public_html/alltrack; else cd ~/kigeki-inc.com/public_html/alltrack-test.kigeki-inc.com; fi && git pull origin ${{ github.ref_name }}"
            